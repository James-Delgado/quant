# Trial-count ledger — METHODOLOGY.md §12 ("Trial-count ledger as a code artifact").
#
# APPEND-ONLY. Each entry is one pre-registered, executed, verdict-reported
# comparison. The cumulative trial count N = sum(n_comparisons) feeds the
# Bailey-López de Prado deflated-Sharpe deflation; it must come from this file,
# not from hand-counting.
#
# Schema (12 fields) is pinned in docs/METHODOLOGY.md §"Reference schemas" and
# enforced by src/quant/ledger.py (LedgerEntry) + tests/test_ledger.py.
# Writer: quant.ledger.append_ledger_entry — never rewrites existing bytes.
#
# Conventions:
#   * Entries are ordered by non-decreasing started_at; ids are unique.
#   * n_comparisons may be 0 for infrastructure milestones that ran no
#     statistical comparison (e.g. M1 regime harness, M4 feature catalog);
#     such entries keep the audit trail without inflating N.
#   * Phase 4A M1-M5 entries are RECONSTRUCTED retroactively: started_at /
#     completed_at are the milestone's git commit time (UTC) and config_hash is
#     that commit SHA, because those milestones predate the runner config-hash
#     pattern. M6 arm entries carry the runner's real config_hash + timestamps
#     from data/phase4a/{arm}/metadata.json. Per-milestone n_comparisons are
#     sourced from docs/PHASE_4A_REPORT.md §7 (total = 62).

