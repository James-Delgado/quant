# Living priorities list — the agent (or human) entry point for "what's next."
#
# Read order for a fresh agent:
#   1. docs/AGENT_OPERATION.md  (the standard operating procedure — the 11-step
#                                workflow every task runs through; binding)
#   2. docs/PROJECT_ROADMAP.md  (what we're building and why)
#   3. docs/METHODOLOGY.md      (how to do it without p-hacking — 20 binding rules)
#   4. docs/PRIORITIES.yaml     (this file — pick the lowest-`rank` `ready` task)
#   5. The task's `references` and `deliverable` fields
#
# Update this file every time a task moves between status values. The file
# is the single source of truth for backlog state.
# Full lifecycle / append / post-task-review protocol lives in the
# `execution_model` section below.

version: 1
last_updated: 2026-06-19

# -----------------------------------------------------------------------------
# Schema
# -----------------------------------------------------------------------------
schema:
  task_status:
    - ready        # all dependencies done; pickable now
    - blocked      # one or more dependencies not done
    - in_progress  # an agent or human has claimed it; only one at a time
    - done         # complete; deliverable exists and tests (if any) pass
    - skipped      # explicitly skipped per a conditional rule in a PRD
  complexity:
    - small        # < 1 day wall-time (drafting a PRD, building a single module + tests)
    - medium       # 1–3 days (executing a milestone end-to-end)
    - large        # > 3 days or > 1 hr compute (full-panel runs, multi-arm experiments)

# -----------------------------------------------------------------------------
# Execution model
# -----------------------------------------------------------------------------
execution_model:
  concurrency: single-threaded
  rationale: |
    Parallel agent commits on overlapping files (most often
    `backtest/harness.py`, `models/*.py`, `features/catalog.yaml`) will
    produce merge conflicts that the harness is not yet built to resolve.
    Single-threaded execution from the top of this list is the safe
    default. Concurrent agent execution via git worktrees is a Phase 5
    sub-feature — see docs/PHASE_5_AGENTS.md.

  task_lifecycle: |
    Completed tasks STAY in this file with `status: done` and
    `completed_at: YYYY-MM-DD`. We do not delete them. Reasons:
      - Dependency graph integrity: `depends_on: [A-LEDGER]` must
        resolve for the lifetime of the file. Deleting `A-LEDGER`
        breaks every forward reference.
      - Project-state vs timeline: this file records the current
        project state; git history records the timeline (who did what,
        when). Mixing the two makes dependency checks impossible.
      - Growth is bounded: at ~1 task/day, the file stays under 100KB
        for years. Archive to docs/historical/PRIORITIES_done.yaml only
        when pressure exists, never before.
    A drift test (`tests/test_priorities.py`, planned alongside
    `A-LEDGER`) enforces: (a) all status values are in the enum,
    (b) all depends_on / blocks references resolve to existing task
    ids, (c) at most one task is `in_progress`, (d) `done` tasks have
    `completed_at`.

  append_protocol: |
    Any agent or human who discovers a new task during work APPENDS it
    to the `tasks` array immediately. Discovered work is captured, not
    dropped on the floor.
      - Choose a unique `id` (kebab-uppercase, e.g. `C2-M2-SMOKE`).
      - Set `status: ready` if it has no unmet dependencies, else
        `blocked` with `depends_on` populated.
      - Set `rank` to fit the priority order; renumber neighbours as
        needed.
      - Populate `notes` with a link to the commit, PR, or notebook
        where the gap was discovered. This is the audit trail.
      - Commit the appended task alongside the work that discovered it.
    For Phase 5: Agent R inherits the triage layer (see
    docs/PHASE_5_AGENTS.md §"Workstream 3"); appended tasks pass
    through a `status: proposed` → `triaged` gate before becoming
    `ready`.

  pick_procedure: |
    1. Read this file.
    2. Find the lowest `rank` task with `status: ready`.
    3. Read its `references.primary` and `references.methodology`
       (docs/METHODOLOGY.md is binding for every task).
    4. Set its `status` to `in_progress`, commit this file alone.
    5. Do the work; produce the `deliverable.file`. Land tests
       alongside per METHODOLOGY.md §15.
    6. Post-task review (METHODOLOGY.md §20, MANDATORY before
       flipping to `done`):
         a. Re-read the deliverable for limitations, bugs, unintended
            behaviour changes.
         b. Cross-check against METHODOLOGY.md — particularly §1
            (pre-committed thresholds), §6 (drift contracts), §15
            (tests landed), §17 (E2E notebook if cross-module).
         c. Append any discovered follow-up tasks to this file per
            `append_protocol`.
         d. Note any methodology deviations explicitly in the commit
            message (METHODOLOGY.md §9).
    7. Set its `status` to `done`, populate `completed_at` (ISO date),
       and walk the `blocks` list — any blocked task whose `depends_on`
       is now fully `done` flips to `ready`.
    8. Commit the deliverable + this file together.

# -----------------------------------------------------------------------------
# Projects
# -----------------------------------------------------------------------------
projects:
  A:
    name: Research substrate & methodology
    status: maintain
    description: |
      Harness, catalog, ablations, regime machinery, runner pattern. Built
      through Phase 4A. Future tasks here are pattern improvements
      identified in PHASE_4A_RETROSPECTIVE.md (trial-count ledger, DSR-aware
      gates, etc.).
    roadmap_section: docs/PROJECT_ROADMAP.md#project-a--research-substrate--methodology-done--maintain
  B:
    name: Predictive research (post-4A)
    status: active
    description: |
      Replacement for Phase 4A's research mission. Sub-projects B1
      (target reframing), B2 (OOS attribution), B3 (alternative data),
      B4 (universe shift).
    roadmap_section: docs/PROJECT_ROADMAP.md#project-b--predictive-research-post-4a
  C:
    name: Live execution & deployment infrastructure
    status: active
    description: |
      Built in parallel with Project B. Sub-projects C1 (live data),
      C2 (LEAN local + paper), C3 (sizing + risk), C4 (confidence
      calibration), C5 (monitoring).
    roadmap_section: docs/PROJECT_ROADMAP.md#project-c--live-execution--deployment-infrastructure
  D:
    name: Continuous research agents (Phase 5)
    status: gated
    triggers_required:
      - "Project B has produced an ablation matrix with at least one cell that clears its pre-committed gate"
      - "Project B2 OOS attribution method is in code with M3 catalog integration shipped"
    description: |
      Vision spec: docs/PHASE_5_AGENTS.md. Begins only when both triggers
      above are met. Until then, every D-prefixed task in this file is
      `blocked` and unpickable.

