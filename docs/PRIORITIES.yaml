    references:
      primary: docs/PROJECT_ROADMAP.md
      execution_bridge: src/quant/execution/lean_bridge.py
      daily_runner: scripts/reconcile_paper_backtest.py
      feature_catalog: src/quant/features/catalog.yaml
      target_catalog: src/quant/features/targets.py
      methodology: docs/METHODOLOGY.md
    est_complexity: small
    notes: |
      Use /plan-prd. Pre-commits (METHODOLOGY §1) the design settled 2026-06-28:
        - STRATEGY = full pipeline spec, not just a model. Schema fields: id,
          display_name, description (human-readable, for the UI), model_ref
          (→ src/quant/models/), feature_set_ref (→ features/catalog.yaml subset),
          target_ref (→ TARGET_CATALOG in features/targets.py), universe,
          decision_rule (forecast→position; the C2 sign() parity rule),
          sizing_policy (C3 fills), confidence_gate (C4 fills), risk_limits (C3:
          max position, drawdown stop), cadence (daily, fixed), broker
          (ExecutionBridge selector; paper now), enabled, provenance,
          created/enabled timestamps. REFERENCES the existing catalogs — does NOT
          duplicate them (DRY / §4). It is the DEPLOYMENT-side subset of Project
          B's research (target,model,universe) portfolio, promoted-to-live.
        - PROVENANCE GATE (methodology guardrail): a strategy may not be
          enabled:true without provenance pointing at a passing gate verdict
          (ledger entry / DSR-aware gate). arima_placeholder is the one sanctioned
          exception (provenance: placeholder, n_comparisons=0 — infra, not an edge
          claim). Carries "no edge without a pre-committed gate" into deployment.
        - DAILY ALLOCATOR (pinned): each cron run, for every ENABLED strategy:
          predict → size (C3×C4) → signed target positions; combine across
          strategies by (a) equal-weight CAPITAL BUDGET per enabled strategy (1/N;
          one config field, later swappable for confidence/track-record weighting),
          (b) confidence enters ONCE at sizing — a high-confidence strategy already
          deploys a larger position, no separate weighting, (c) NET the signed
          sized positions per symbol and clamp to the per-symbol risk cap. Opposed
          signals net to a residual.
        - INITIAL STATE: exactly one enabled entry (arima_placeholder) → 100% of
          the (1/N=1) budget → FULLY-INVESTED EQUAL-WEIGHT-WITHIN-UNIVERSE sizing
          (until C3), so the portfolio/sizing/netting path is exercised end-to-end
          and the C2-M2-SIZING-PARITY gap is closed here. P&L stays uninteresting
          (ARIMA on a few names) by design.
        - UI CONTRACT (Project E): the registry exposes UI-presentable fields + a
          documented serializable view-model (in-use AND idle strategies) the
          console export consumes. The panel itself is E-STRATEGIES-PANEL
          (depends_on C6-M1) — coordinate with the Project E owner.
        - PAPER ONLY: broker=alpaca_paper; ExecutionBridge already abstracts paper
          vs live, so live is a later config flag, out of scope here.

