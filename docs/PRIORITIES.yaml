  - id: C6-PRD
    rank: 22
    title: "Draft C6 (strategy registry + daily executor) PRD"
    project: C
    sub_project: C6
    status: done
    started_at: 2026-06-28T18:00:00Z
    completed_at: 2026-06-28
    depends_on: [C2-M2]
    blocks: [C6-M1]
    deliverable:
