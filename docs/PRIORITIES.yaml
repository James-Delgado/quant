      reference only; (b) keep cross-design but reframe G2 as a "design-sensitivity"
      report, not a 0.90 reproduction gate; (c) accept the mismatch and document G2
      as N/A. NOTE this does NOT affect the B2 G1 verdict (permutation vs LOO ablation,
