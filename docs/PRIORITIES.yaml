      flat→long / flat→short OPEN case (proven against simulate() in
      tests/test_lean_bridge.py — cash-bound and liquidity-bound). It is an
      APPROXIMATION on a direct cross (short→long or long→short): the simulator
      CLOSES the existing position first, then sizes the new one off the
      post-close cash (which includes the close proceeds), whereas
      place_sized_target sizes off the account cash read BEFORE the close. The
      residual is the sizing delta from the intermediate cash difference. Per the
      C2-M2-SIZING-PARITY task framing, C2-M3's G2 may absorb this as a NAMED
      residual component (METHODOLOGY §9, no unexplained gap) rather than
      requiring an exact cross-sizing match — so this is NON-GATING and
      intentionally NOT added to C-CLOSE.depends_on (mirrors the C1-M*-* /
      C6-DD non-gating-refinement exclusion precedent; a refinement must not
      deadlock closeout). Close by either sizing off simulated post-close cash or
      documenting the residual in the G2 decomposition. Low priority.

